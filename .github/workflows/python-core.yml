name: Python core validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            dev-requirements.txt
            setup.py

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r dev-requirements.txt

      - name: Lint
        run: ruff check src tests setup.py launch

      - name: Run unit tests
        run: pytest

      - name: Validate installed motion CLI
        run: |
          faultnav-experiment \
            --scenario figure-eight \
            --step 0.2 \
            --output-dir artifacts/motion-ci
          test -s artifacts/motion-ci/figure_eight_trajectory.csv
          test -s artifacts/motion-ci/figure_eight_metrics.json
          test -s artifacts/motion-ci/figure_eight_trajectory.svg

      - name: Validate installed sensor-fault CLI
        run: |
          faultnav-experiment \
            --scenario figure-eight \
            --step 0.2 \
            --sensor-profile combined-faults \
            --seed 7 \
            --output-dir artifacts/sensor-ci
          test -s artifacts/sensor-ci/figure_eight_combined_faults_sensor.csv
          test -s artifacts/sensor-ci/figure_eight_combined_faults_sensor_metrics.json
          test -s artifacts/sensor-ci/figure_eight_combined_faults_sensor_report.svg

      - name: Validate installed EKF comparison CLI
        run: |
          faultnav-experiment \
            --scenario figure-eight \
            --step 0.1 \
            --sensor-profile combined-faults \
            --estimator compare \
            --seed 7 \
            --output-dir artifacts/estimator-ci
          test -s artifacts/estimator-ci/figure_eight_combined_faults_estimator.csv
          test -s artifacts/estimator-ci/figure_eight_combined_faults_estimator_metrics.json
          test -s artifacts/estimator-ci/figure_eight_combined_faults_estimator_report.svg
