name: Python core validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: dev-requirements.txt

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r dev-requirements.txt

      - name: Lint
        run: ruff check src tests setup.py launch

      - name: Run unit tests
        run: pytest

      - name: Validate installed experiment CLI
        run: |
          faultnav-experiment \
            --scenario figure-eight \
            --step 0.2 \
            --output-dir artifacts/ci
          test -s artifacts/ci/figure_eight_trajectory.csv
          test -s artifacts/ci/figure_eight_metrics.json
          test -s artifacts/ci/figure_eight_trajectory.svg
