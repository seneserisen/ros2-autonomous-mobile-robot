name: Feature request
description: Propose a scoped FaultNav engineering improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Engineering or user problem
      description: Describe the problem before proposing an implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What observable behavior or evidence should improve?
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: interfaces
    attributes:
      label: Affected interfaces and assumptions
      description: Include Python APIs, CLI, artifacts, ROS topics, frames, units, timestamps, configuration, data, or hardware implications.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: verification
    attributes:
      label: Proposed verification
      description: Describe analytical cases, tests, simulation scenarios, metrics, or manual ROS checks.
  - type: textarea
    id: risks
    attributes:
      label: Risks and constraints
      description: Include compatibility, numerical, security, privacy, performance, cost, licensing, and safety concerns where relevant.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Safety, data loss, or blocking correctness
        - P1 — Core portfolio milestone
        - P2 — Valuable improvement
        - P3 — Later idea
    validations:
      required: true
