name: Bug report
description: Report reproducible incorrect FaultNav behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened? Include exact outputs or metrics where relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: State the expected mathematical, Python, CLI, artifact, or ROS behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest reliable command, scenario, configuration, and seed.
      placeholder: |
        1. Install with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: engineering_context
    attributes:
      label: Engineering context
      description: Include units, coordinate frames, timestamps, integration step, sensor profile, random seed, and expected tolerance when relevant.
  - type: input
    id: version
    attributes:
      label: Commit, branch, or release
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, ROS 2 distribution, simulator, hardware, and dependency versions where relevant.
  - type: textarea
    id: evidence
    attributes:
      label: Logs or artifacts
      description: Remove secrets and personal or confidential data before attaching evidence.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I checked that an equivalent issue is not already open.
          required: true
        - label: I removed secrets, credentials, and unnecessary personal data.
          required: true
